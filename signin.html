<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="auth-container">
            <h1>Sign In</h1>
            <form action="" id="signin-form">
                <input type="text" name="" id="signin-username" placeholder="Enter Username" required>
                <input type="password" name="" id="signin-password" placeholder="Enter Password" required>
                <button type="submit">Sign In</button>
            </form>
            <p id="signin-error-message"></p>

            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
        </div>

    </div>
</body>
</html>
